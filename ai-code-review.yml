name: AI Code Review

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          else
            git diff HEAD~1 HEAD > diff.txt
          fi

      - name: AI Review with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          DIFF=$(cat diff.txt | head -c 8000)

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": \"You are a senior code reviewer. Review this git diff and provide:\n1. Summary of changes\n2. Bugs or issues\n3. Security concerns\n4. Suggestions\n5. Verdict: Approve / Request Changes\n\nDiff:\n$DIFF\"
                }]
              }]
            }")

          REVIEW=$(echo $RESPONSE | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['candidates'][0]['content']['parts'][0]['text'])
          ")

          echo "## 🤖 AI Code Review" > review_comment.md
          echo "" >> review_comment.md
          echo "$REVIEW" >> review_comment.md

          if [ -n "$PR_NUMBER" ]; then
            curl -s -X POST \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"body\": $(cat review_comment.md | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}"
          fi

          cat review_comment.md
